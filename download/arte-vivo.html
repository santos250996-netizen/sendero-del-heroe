<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Vivo — un lienzo que respira</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    cursor: none;
    font-family: 'Cormorant Garamond', serif;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #bg-canvas   { z-index: 1; }
  #main-canvas { z-index: 2; }

  /* subtle cursor glow */
  #cursor-glow {
    position: fixed;
    width: 28px; height: 28px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    transform: translate(-50%, -50%);
    border: 1.5px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 30px 6px rgba(255,255,255,0.06);
    transition: opacity 0.4s;
    opacity: 0;
  }
  body:hover #cursor-glow { opacity: 1; }

  /* overlay text */
  #overlay {
    position: fixed;
    z-index: 5;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: opacity 2.5s ease;
  }
  #overlay h1 {
    font-weight: 300;
    font-style: italic;
    font-size: clamp(28px, 5vw, 64px);
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.15em;
    animation: breathe 6s ease-in-out infinite;
  }
  #overlay p {
    font-weight: 300;
    font-style: italic;
    font-size: clamp(13px, 1.8vw, 18px);
    color: rgba(255,255,255,0.08);
    margin-top: 12px;
    letter-spacing: 0.25em;
  }
  #overlay.faded { opacity: 0; }

  @keyframes breathe {
    0%, 100% { opacity: 0.12; transform: scale(1); }
    50%      { opacity: 0.22; transform: scale(1.02); }
  }

  /* bottom poetic line */
  #poem-line {
    position: fixed;
    bottom: 28px;
    width: 100%;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(11px, 1.4vw, 15px);
    color: rgba(255,255,255,0);
    letter-spacing: 0.2em;
    transition: color 3s ease;
  }
  #poem-line.visible { color: rgba(255,255,255,0.09); }

  /* mode indicator */
  #mode {
    position: fixed;
    top: 20px; right: 24px;
    z-index: 5;
    pointer-events: none;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.06);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    transition: color 0.6s;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="main-canvas"></canvas>
<div id="cursor-glow"></div>

<div id="overlay">
  <h1>arte vivo</h1>
  <p>mueve &middot; respira &middot; crea</p>
</div>

<div id="poem-line"></div>
<div id="mode"></div>

<script>
// ─── configuration ────────────────────────────────────
const PALETTES = [
  // [hue base, hue range, sat, light]
  { name: 'aurora',   hue: 140, range: 80,  sat: 55, lit: 62 },
  { name: 'crepusculo', hue: 20,  range: 40,  sat: 65, lit: 58 },
  { name: 'oceano',   hue: 200, range: 50,  sat: 50, lit: 60 },
  { name: 'bosque',   hue: 90,  range: 60,  sat: 45, lit: 55 },
  { name: 'nebula',   hue: 280, range: 70,  sat: 55, lit: 65 },
  { name: 'fuego',    hue: 5,   range: 30,  sat: 70, lit: 55 },
  { name: 'rosa',     hue: 330, range: 40,  sat: 50, lit: 68 },
];

const POEMS = [
  'cada trazo es un suspiro que el viento olvidó',
  'los colores hablan cuando el silencio escucha',
  'el arte no se termina… se abandona',
  'dibujar es soñar con los ojos abiertos',
  'tu mano es un río que busca el mar',
  'entre el caos y la calma nace lo bello',
  'la luz no tiene prisa, pero todo lo alcanza',
  'pintar es tocar el alma con los dedos',
];

const MODES = [
  { name: 'flujo',     particles: 6, size: [2, 8],  life: [60, 140], gravity: 0,    trail: 0.012, shape: 'circle' },
  { name: 'constelación', particles: 3, size: [1.5, 4], life: [80, 200], gravity: 0, trail: 0.006, shape: 'star' },
  { name: 'lluvia',    particles: 2, size: [1, 3],   life: [40, 100], gravity: 0.12, trail: 0.02,  shape: 'line' },
  { name: 'nebulosa',  particles: 8, size: [10, 35], life: [80, 160], gravity: 0,    trail: 0.005, shape: 'soft' },
];

// ─── state ────────────────────────────────────────────
let W, H;
let bgCtx, mainCtx;
let mouse = { x: 0, y: 0, px: 0, py: 0, active: false };
let particles = [];
let palette = PALETTES[0];
let mode = MODES[0];
let modeIdx = 0;
let paletteIdx = 0;
let frameCount = 0;
let hasInteracted = false;
let bgStars = [];

// ─── setup ───────────────────────────────────────────
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  [bgCanvas, mainCanvas].forEach(c => {
    c.width  = W * dpr;
    c.height = H * dpr;
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  initBgStars();
}

function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 120; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random() * 0.25 + 0.03,
      speed: Math.random() * 0.003 + 0.001,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

const bgCanvas   = document.getElementById('bg-canvas');
const mainCanvas = document.getElementById('main-canvas');
const cursorGlow = document.getElementById('cursor-glow');
const overlay    = document.getElementById('overlay');
const poemLine   = document.getElementById('poem-line');
const modeEl     = document.getElementById('mode');

bgCtx   = bgCanvas.getContext('2d');
mainCtx = mainCanvas.getContext('2d');

window.addEventListener('resize', resize);
resize();

// ─── input ───────────────────────────────────────────
function onMove(x, y) {
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = x;
  mouse.y = y;
  mouse.active = true;
  cursorGlow.style.left = x + 'px';
  cursorGlow.style.top  = y + 'px';

  if (!hasInteracted) {
    hasInteracted = true;
    overlay.classList.add('faded');
    setTimeout(() => showPoem(), 3000);
    updateModeLabel();
  }

  // spawn particles
  const count = mode.particles;
  const dx = mouse.x - mouse.px;
  const dy = mouse.y - mouse.py;
  const speed = Math.sqrt(dx * dx + dy * dy);

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const vel = (Math.random() * 1.5 + 0.3) * Math.min(speed * 0.08, 3);
    const [minS, maxS] = mode.size;
    const [minL, maxL] = mode.life;
    particles.push({
      x: mouse.x + (Math.random() - 0.5) * 10,
      y: mouse.y + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * vel + dx * 0.04,
      vy: Math.sin(angle) * vel + dy * 0.04,
      size: Math.random() * (maxS - minS) + minS,
      life: Math.random() * (maxL - minL) + minL,
      maxLife: 0,
      hue: palette.hue + (Math.random() - 0.5) * palette.range * 2,
      sat: palette.sat + (Math.random() - 0.5) * 20,
      lit: palette.lit + (Math.random() - 0.5) * 15,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.06,
      shape: mode.shape,
    });
    particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
  }
}

document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  onMove(t.clientX, t.clientY);
}, { passive: false });
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.px = mouse.x;
  mouse.py = mouse.y;
});

// click → change mode
document.addEventListener('click', () => {
  modeIdx = (modeIdx + 1) % MODES.length;
  mode = MODES[modeIdx];
  updateModeLabel();
});
document.addEventListener('touchend', () => {
  modeIdx = (modeIdx + 1) % MODES.length;
  mode = MODES[modeIdx];
  updateModeLabel();
});

// keyboard → change palette
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    paletteIdx = (paletteIdx + 1) % PALETTES.length;
    palette = PALETTES[paletteIdx];
    updateModeLabel();
  }
  if (e.key === 'c' || e.key === 'C') {
    // clear canvas with a fade
    particles = [];
    mainCtx.clearRect(0, 0, W, H);
  }
});

function updateModeLabel() {
  modeEl.textContent = `${mode.name} · ${palette.name}`;
  modeEl.style.color = 'rgba(255,255,255,0.1)';
  setTimeout(() => modeEl.style.color = 'rgba(255,255,255,0.06)', 600);
}

let poemIdx = 0;
function showPoem() {
  poemLine.textContent = POEMS[poemIdx % POEMS.length];
  poemLine.classList.add('visible');
  poemIdx++;
}

setInterval(() => {
  if (hasInteracted) {
    poemLine.classList.remove('visible');
    setTimeout(() => {
      poemLine.textContent = POEMS[poemIdx % POEMS.length];
      poemLine.classList.add('visible');
      poemIdx++;
    }, 1500);
  }
}, 12000);

// ─── drawing helpers ─────────────────────────────────
function drawStar(ctx, cx, cy, r, points, rotation) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = rotation + (i * Math.PI) / points;
    const rad = i % 2 === 0 ? r : r * 0.35;
    const x = cx + Math.cos(angle) * rad;
    const y = cy + Math.sin(angle) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawParticle(ctx, p) {
  const progress = 1 - p.life / p.maxLife;
  const alpha = Math.sin(progress * Math.PI) * 0.85;
  const size  = p.size * (0.4 + 0.6 * Math.sin(progress * Math.PI));
  const hue = p.hue;
  const sat = p.sat;
  const lit = p.lit;

  ctx.save();
  ctx.globalAlpha = alpha;

  if (p.shape === 'soft') {
    // soft nebula blob
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size);
    grad.addColorStop(0, `hsla(${hue}, ${sat}%, ${lit}%, 0.35)`);
    grad.addColorStop(0.5, `hsla(${hue}, ${sat}%, ${lit}%, 0.1)`);
    grad.addColorStop(1, `hsla(${hue}, ${sat}%, ${lit}%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.shape === 'star') {
    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${lit + 10}%, 1)`;
    ctx.shadowColor = `hsla(${hue}, ${sat}%, ${lit}%, 0.6)`;
    ctx.shadowBlur = size * 3;
    drawStar(ctx, p.x, p.y, size, 4, p.rotation);
    ctx.fill();
  } else if (p.shape === 'line') {
    ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${lit}%, 1)`;
    ctx.lineWidth = Math.max(0.5, size * 0.5);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - size * 1.5);
    ctx.lineTo(p.x + p.vx * 3, p.y + size * 1.5);
    ctx.stroke();
  } else {
    // circle
    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${lit}%, 1)`;
    ctx.shadowColor = `hsla(${hue}, ${sat}%, ${lit}%, 0.5)`;
    ctx.shadowBlur = size * 2.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, size), 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ─── background render ────────────────────────────────
function drawBackground(t) {
  // dark gradient that slowly shifts
  const hueShift = (t * 0.005) % 360;
  const grad = bgCtx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.7);
  grad.addColorStop(0, `hsla(${(hueShift + palette.hue) % 360}, 15%, 6%, 1)`);
  grad.addColorStop(1, '#0a0a0f');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, W, H);

  // stars
  bgStars.forEach(s => {
    const flicker = Math.sin(t * s.speed + s.phase) * 0.5 + 0.5;
    bgCtx.fillStyle = `rgba(255, 255, 255, ${s.a * flicker})`;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fill();
  });
}

// ─── main loop ───────────────────────────────────────
function loop(timestamp) {
  frameCount++;
  const t = timestamp * 0.001;

  drawBackground(t);

  // fade the main canvas (trail effect)
  mainCtx.fillStyle = `rgba(10, 10, 15, ${mode.trail})`;
  mainCtx.fillRect(0, 0, W, H);

  // update & draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += mode.gravity;
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.rotation += p.rotSpeed;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    drawParticle(mainCtx, p);
  }

  // limit particles
  if (particles.length > 3000) {
    particles.splice(0, particles.length - 3000);
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
